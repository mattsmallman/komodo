#######################################
# 🦎 KOMODO SWARM COMPOSE - MONGO 🦎 #
#######################################

## This compose file will deploy Komodo to Docker Swarm:
##   1. MongoDB
##   2. Komodo Core
##   3. Komodo Periphery

## To deploy this stack:
##   docker stack deploy -c compose/mongo.swarm.compose.yaml --compose-file compose/compose.env komodo

version: "3.8"

services:
  mongo:
    image: mongo
    labels:
      komodo.skip: "" # Prevent Komodo from stopping with StopAllContainers
    command: --quiet --wiredTigerCacheSizeGB 0.25
    networks:
      - komodo_network
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${KOMODO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${KOMODO_DB_PASSWORD}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: stop-first
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
  
  core:
    image: ghcr.io/moghtech/komodo-core:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip: "" # Prevent Komodo from stopping with StopAllContainers
    networks:
      - komodo_network
    environment:
      KOMODO_DATABASE_ADDRESS: mongo:27017
      KOMODO_DATABASE_USERNAME: ${KOMODO_DB_USERNAME}
      KOMODO_DATABASE_PASSWORD: ${KOMODO_DB_PASSWORD}
    volumes:
      ## Store dated backups of the database - https://komo.do/docs/setup/backup
      - komodo-backups:/backups
    ports:
      - target: 9120
        published: 9120
        protocol: tcp
        mode: host
    configs:
      - source: core_config
        target: /config/config.toml
        mode: 0444
    secrets:
      - komodo_db_password
      - komodo_jwt_secret
      - komodo_webhook_secret
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  periphery:
    image: ghcr.io/moghtech/komodo-periphery:${COMPOSE_KOMODO_IMAGE_TAG:-latest}
    labels:
      komodo.skip: "" # Prevent Komodo from stopping with StopAllContainers
    networks:
      - komodo_network
    volumes:
      ## Mount external docker socket
      - /var/run/docker.sock:/var/run/docker.sock
      ## Allow Periphery to see processes outside of container
      - /proc:/proc
      ## Specify the Periphery agent root directory.
      - ${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}:${PERIPHERY_ROOT_DIRECTORY:-/etc/komodo}
    secrets:
      - komodo_passkey
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  komodo_network:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.0.9.0/24

volumes:
  mongo-data:
  mongo-config:
  komodo-backups:

secrets:
  komodo_db_password:
    external: true
  komodo_jwt_secret:
    external: true
  komodo_webhook_secret:
    external: true
  komodo_passkey:
    external: true

configs:
  core_config:
    external: true
